name: Check examples

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check shell example
        run: bash -n examples/upload.sh
      - name: Check Node.js example
        run: node --check examples/upload.mjs
      - name: Check Python example
        run: python -m py_compile examples/upload.py
